apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: audit-require-run-as-non-root
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: run-as-non-root
      match:
        any:
          - resources:
              kinds: [Pod]
      exclude:
        any:
          - resources:
              namespaces: [kube-system, kube-public, kube-node-lease, argocd, monitoring, kyverno, trivy-system]
      validate:
        message: "runAsNonRoot should be true."
        pattern:
          spec:
            containers:
              - securityContext:
                  =(runAsNonRoot): true
