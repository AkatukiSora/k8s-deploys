apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: audit-disallow-privileged
  annotations:
    policies.kyverno.io/category: Pod Security
spec:
  admission: true
  validationFailureAction: Audit
  background: true
  emitWarning: false
  rules:
    - name: privileged-disallowed
      skipBackgroundRequests: true
      match:
        any:
          - resources:
              kinds: [Pod]
      exclude:
        any:
          - resources:
              namespaces: [kube-system, kube-public, kube-node-lease, argocd, monitoring, kyverno, trivy-system]
      validate:
        allowExistingViolations: true
        message: "Privileged containers are not allowed."
        pattern:
          spec:
            containers:
              - securityContext:
                  =(privileged): "false"
