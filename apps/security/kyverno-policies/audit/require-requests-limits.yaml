apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: audit-require-requests-limits
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: resources-required
      match:
        any:
          - resources:
              kinds: [Pod]
      exclude:
        any:
          - resources:
              namespaces: [kube-system, kube-public, kube-node-lease, argocd, monitoring, kyverno, trivy-system]
      validate:
        message: "CPU/memory requests and limits should be defined."
        pattern:
          spec:
            containers:
              - resources:
                  requests:
                    cpu: "?*"
                    memory: "?*"
                  limits:
                    cpu: "?*"
                    memory: "?*"
