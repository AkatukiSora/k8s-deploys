apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: enforce-disallow-tenant-onepassworditems
  annotations:
    policies.kyverno.io/category: Multi Tenancy
spec:
  admission: true
  validationFailureAction: Enforce
  background: true
  emitWarning: false
  rules:
    - name: tenant-onepassworditems-disallowed
      skipBackgroundRequests: true
      match:
        any:
          - resources:
              kinds:
                - onepassword.com/v1/OnePasswordItem
              namespaceSelector:
                matchExpressions:
                  - key: capsule.clastix.io/tenant
                    operator: Exists
      # soras-tenant is a trusted migration tenant whose applications manage
      # existing 1PasswordItem resources through GitOps.
      exclude:
        any:
          - resources:
              namespaces:
                - caddy-test
                - coder
                - immich
                - immich-postgres
                - influxdb
                - pjserver-sys
                - vikunja
      validate:
        allowExistingViolations: true
        message: "Tenant namespaces cannot manage OnePasswordItem resources unless explicitly exempted."
        deny: {}
