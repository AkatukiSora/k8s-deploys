---
admissionController:
  replicas: 2
  serviceMonitor:
    enabled: true
    additionalLabels:
      release: kube-prometheus-stack

backgroundController:
  enabled: true
  replicas: 1
  serviceMonitor:
    enabled: true
    additionalLabels:
      release: kube-prometheus-stack

cleanupController:
  enabled: false

reportsController:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 400m
      memory: 96Mi
    limits:
      cpu: 800m
      memory: 192Mi
  serviceMonitor:
    enabled: true
    additionalLabels:
      release: kube-prometheus-stack

grafana:
  enabled: false

features:
  # Temporary storage-pressure mitigation. Re-enable once Ceph latency is fixed.
  admissionReports:
    enabled: false
  aggregateReports:
    enabled: false
  policyReports:
    enabled: true
  validatingAdmissionPolicyReports:
    enabled: false
  backgroundScan:
    enabled: false
