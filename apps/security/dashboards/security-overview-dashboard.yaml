apiVersion: v1
kind: ConfigMap
metadata:
  name: security-overview-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  security-overview.json: |
    {
      "id": null,
      "uid": "security-overview",
      "title": "Security Overview",
      "tags": ["security", "kyverno", "trivy"],
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "time": {"from": "now-6h", "to": "now"},
      "panels": [
        {
          "type": "timeseries",
          "title": "Kyverno Policy Fail Rate",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
          "targets": [{"expr": "sum(rate(kyverno_policy_results_total{result=\"fail\"}[5m]))", "refId": "A"}]
        },
        {
          "type": "timeseries",
          "title": "Kyverno Admission P99 Latency",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
          "targets": [{"expr": "histogram_quantile(0.99, sum by (le) (rate(kyverno_admission_review_duration_seconds_bucket[5m])))", "refId": "A"}]
        },
        {
          "type": "stat",
          "title": "Trivy Critical Vulnerabilities",
          "gridPos": {"h": 6, "w": 8, "x": 0, "y": 8},
          "targets": [{"expr": "sum(trivy_image_vulnerabilities{severity=\"Critical\"}) or vector(0)", "refId": "A"}]
        },
        {
          "type": "stat",
          "title": "Trivy High Vulnerabilities",
          "gridPos": {"h": 6, "w": 8, "x": 8, "y": 8},
          "targets": [{"expr": "sum(trivy_image_vulnerabilities{severity=\"High\"}) or vector(0)", "refId": "A"}]
        },
        {
          "type": "stat",
          "title": "Trivy Config Audit Findings",
          "gridPos": {"h": 6, "w": 8, "x": 16, "y": 8},
          "targets": [{"expr": "sum(trivy_resource_configaudits) or vector(0)", "refId": "A"}]
        }
      ]
    }
