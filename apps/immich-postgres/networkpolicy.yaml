apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: immich-postgres-allow-immich
  namespace: immich-postgres
spec:
  podSelector:
    matchLabels:
      cnpg.io/cluster: immich-postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: immich
      ports:
        - protocol: TCP
          port: 5432
