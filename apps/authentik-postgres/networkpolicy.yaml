apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: authentik-postgres-allow-authentik
  namespace: authentik
spec:
  podSelector:
    matchLabels:
      cnpg.io/cluster: authentik-postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 5432
