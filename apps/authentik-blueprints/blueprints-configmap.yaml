apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-blueprints
  namespace: authentik
data:
  10-oidc-applications.yaml: |
    version: 1
    metadata:
      name: OIDC applications for Kubernetes and Proxmox
    entries:
      - id: kubernetes-group
        model: authentik_core.group
        identifiers:
          name: kubernetes-users

      - id: proxmox-group
        model: authentik_core.group
        identifiers:
          name: proxmox-users

      - id: kubernetes-profile-scope
        model: authentik_providers_oauth2.scopemapping
        identifiers:
          name: Kubernetes profile claims
        attrs:
          scope_name: profile
          expression: |
            return {
                "name": request.user.name,
                "preferred_username": request.user.username,
                "username": request.user.username,
                "email": request.user.email,
                "groups": [group.name for group in request.user.groups.all()],
            }

      - id: proxmox-profile-scope
        model: authentik_providers_oauth2.scopemapping
        identifiers:
          name: Proxmox profile claims
        attrs:
          scope_name: profile
          expression: |
            return {
                "name": request.user.name,
                "preferred_username": request.user.username,
                "username": request.user.username,
                "email": request.user.email,
                "groups": [group.name for group in request.user.groups.all()],
            }

      - id: kubernetes-provider
        model: authentik_providers_oauth2.oauth2provider
        identifiers:
          name: Kubernetes API provider
        attrs:
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          client_id: kubernetes-cluster
          client_secret: !Env KUBERNETES_OIDC_CLIENT_SECRET
          # Use an asymmetric signing key so the JWKS endpoint exposes public keys.
          signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
          issuer_mode: per_provider
          include_claims_in_id_token: true
          sub_mode: user_username
          redirect_uris:
            - matching_mode: regex
              url: ^http://localhost(:[0-9]+)?/?$
            - matching_mode: regex
              url: ^http://127\.0\.0\.1(:[0-9]+)?/?$
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [name, "authentik default OAuth Mapping: OpenID 'openid'"]]
            - !Find [authentik_providers_oauth2.scopemapping, [name, "authentik default OAuth Mapping: OpenID 'email'"]]
            - !KeyOf kubernetes-profile-scope

      - id: proxmox-provider
        model: authentik_providers_oauth2.oauth2provider
        identifiers:
          name: Proxmox VE provider
        attrs:
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          client_id: proxmox-ve
          client_secret: !Env PROXMOX_OIDC_CLIENT_SECRET
          # Proxmox requires a JWKS with public keys, so this provider must use an asymmetric signing key.
          signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
          issuer_mode: per_provider
          include_claims_in_id_token: true
          sub_mode: user_email
          redirect_uris:
            - matching_mode: strict
              url: https://proxmox.akatuki-host.com/
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [name, "authentik default OAuth Mapping: OpenID 'openid'"]]
            - !Find [authentik_providers_oauth2.scopemapping, [name, "authentik default OAuth Mapping: OpenID 'email'"]]
            - !KeyOf proxmox-profile-scope

      - id: kubernetes-application
        model: authentik_core.application
        identifiers:
          slug: kubernetes
        attrs:
          name: Kubernetes API
          provider: !KeyOf kubernetes-provider
          meta_launch_url: https://kubernetes.default.svc

      - id: proxmox-application
        model: authentik_core.application
        identifiers:
          slug: proxmox
        attrs:
          name: Proxmox VE
          provider: !KeyOf proxmox-provider
          meta_launch_url: https://proxmox.akatuki-host.com/

      - model: authentik_policies.policybinding
        identifiers:
          target: !KeyOf kubernetes-application
          order: 0
        attrs:
          group: !KeyOf kubernetes-group

      - model: authentik_policies.policybinding
        identifiers:
          target: !KeyOf proxmox-application
          order: 0
        attrs:
          group: !KeyOf proxmox-group
