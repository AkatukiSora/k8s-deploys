  60-invite-enrollment.yaml: |
    version: 1
    metadata:
      name: Invite enrollment flow
    entries:
      - identifiers:
          slug: invite-enrollment
        model: authentik_flows.flow
        id: invite-enrollment-flow
        attrs:
          name: Invite enrollment
          title: Welcome! Complete your enrollment
          designation: enrollment
          authentication: require_unauthenticated

      - identifiers:
          name: invite-enrollment-invitation
        id: invite-enrollment-invitation-stage
        model: authentik_stages_invitation.invitationstage
        attrs:
          continue_flow_without_invitation: false

      - identifiers:
          name: invite-enrollment-field-username
        id: invite-enrollment-field-username
        model: authentik_stages_prompt.prompt
        attrs:
          field_key: username
          label: Username
          type: username
          required: true
          placeholder: Username
          placeholder_expression: false
          order: 0

      - identifiers:
          name: invite-enrollment-field-password
        id: invite-enrollment-field-password
        model: authentik_stages_prompt.prompt
        attrs:
          field_key: password
          label: Password
          type: password
          required: true
          placeholder: Password
          placeholder_expression: false
          order: 1

      - identifiers:
          name: invite-enrollment-field-password-repeat
        id: invite-enrollment-field-password-repeat
        model: authentik_stages_prompt.prompt
        attrs:
          field_key: password_repeat
          label: Password (repeat)
          type: password
          required: true
          placeholder: Password (repeat)
          placeholder_expression: false
          order: 2

      - identifiers:
          name: invite-enrollment-field-name
        id: invite-enrollment-field-name
        model: authentik_stages_prompt.prompt
        attrs:
          field_key: name
          label: Name
          type: text
          required: true
          placeholder: Name
          placeholder_expression: false
          order: 0

      - identifiers:
          name: invite-enrollment-field-email
        id: invite-enrollment-field-email
        model: authentik_stages_prompt.prompt
        attrs:
          field_key: email
          label: Email
          type: email
          required: true
          placeholder: Email
          placeholder_expression: false
          order: 1

      - identifiers:
          name: invite-enrollment-prompt-credentials
        id: invite-enrollment-prompt-credentials
        model: authentik_stages_prompt.promptstage
        attrs:
          fields:
            - !KeyOf invite-enrollment-field-username
            - !KeyOf invite-enrollment-field-password
            - !KeyOf invite-enrollment-field-password-repeat

      - identifiers:
          name: invite-enrollment-prompt-profile
        id: invite-enrollment-prompt-profile
        model: authentik_stages_prompt.promptstage
        attrs:
          fields:
            - !KeyOf invite-enrollment-field-name
            - !KeyOf invite-enrollment-field-email

      - identifiers:
          name: invite-enrollment-assign-groups
        id: invite-enrollment-assign-groups
        model: authentik_policies_expression.expressionpolicy
        attrs:
          expression: |
            from authentik.core.models import Group

            flow_plan = request.context.get("flow_plan")
            if not flow_plan:
                ak_message("Missing flow context")
                return False

            prompt_data = flow_plan.context.get("prompt_data", {})
            invite_kind = prompt_data.get("invite_kind")

            group_sets = {
                "friend-media": ["cohort:friend", "team:media-user"],
                "friend-dev": ["cohort:friend", "team:dev-user"],
                "friend-storage": ["cohort:friend", "team:storage-user"],
                "family-media": ["cohort:family", "team:media-user"],
                "family-storage": ["cohort:family", "team:storage-user"],
                "family-media-storage": ["cohort:family", "team:media-user", "team:storage-user"],
                "nkc-dev": ["cohort:nkc-member", "team:dev-user"],
                "nkc-storage": ["cohort:nkc-member", "team:storage-user"],
            }

            group_names = list(prompt_data.get("invite_groups", []))
            if not group_names and invite_kind:
                group_names = group_sets.get(invite_kind, [])

            allowed_prefixes = ("cohort:", "team:")
            denied_groups = {"team:owner"}
            invalid_group_names = [
                name for name in group_names
                if not isinstance(name, str)
                or not name.startswith(allowed_prefixes)
                or name in denied_groups
            ]
            if not group_names or invalid_group_names:
                ak_message("Invalid or missing invite_groups/invite_kind")
                return False

            flow_plan.context["groups"] = list(Group.objects.filter(name__in=group_names))
            found_group_names = {group.name for group in flow_plan.context["groups"]}
            missing_group_names = set(group_names) - found_group_names
            if missing_group_names:
                ak_message("Missing invite groups: %s" % ", ".join(sorted(missing_group_names)))
                return False

            return True


      - identifiers:
          name: invite-enrollment-email-verification
        id: invite-enrollment-email-verification
        model: authentik_stages_email.emailstage
        attrs:
          use_global_settings: true
          template: email/account_confirmation.html
          activate_user_on_success: true

      - identifiers:
          name: invite-enrollment-user-write
        id: invite-enrollment-user-write
        model: authentik_stages_user_write.userwritestage
        attrs:
          create_users_as_inactive: true
          user_creation_mode: always_create
          user_type: internal

      - identifiers:
          name: invite-enrollment-user-login
        id: invite-enrollment-user-login
        model: authentik_stages_user_login.userloginstage

      - identifiers:
          target: !KeyOf invite-enrollment-flow
          stage: !KeyOf invite-enrollment-invitation-stage
          order: 5
        model: authentik_flows.flowstagebinding
        attrs:
          evaluate_on_plan: true
          re_evaluate_policies: true

      - identifiers:
          target: !KeyOf invite-enrollment-flow
          stage: !KeyOf invite-enrollment-prompt-credentials
          order: 10
        model: authentik_flows.flowstagebinding

      - identifiers:
          target: !KeyOf invite-enrollment-flow
          stage: !KeyOf invite-enrollment-prompt-profile
          order: 15
        model: authentik_flows.flowstagebinding

      - identifiers:
          target: !KeyOf invite-enrollment-flow
          stage: !KeyOf invite-enrollment-user-write
          order: 20
        id: invite-enrollment-user-write-binding
        model: authentik_flows.flowstagebinding

      - identifiers:
          target: !KeyOf invite-enrollment-user-write-binding
          policy: !KeyOf invite-enrollment-assign-groups
          order: 0
        model: authentik_policies.policybinding
        attrs:
          failure_result: false

      - identifiers:
          target: !KeyOf invite-enrollment-flow
          stage: !KeyOf invite-enrollment-email-verification
          order: 30
        model: authentik_flows.flowstagebinding

      - identifiers:
          target: !KeyOf invite-enrollment-flow
          stage: !KeyOf invite-enrollment-user-login
          order: 100
        model: authentik_flows.flowstagebinding
