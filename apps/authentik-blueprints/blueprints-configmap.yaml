apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-blueprints
  namespace: authentik
data:
  10-groups.yaml: |
    version: 1
    metadata:
      name: Authentik permission groups
    entries:
      - id: app-authentik-global-admin-group
        model: authentik_core.group
        identifiers:
          name: "app:authentik:global:admin"

      - id: app-k8s-cluster-admin-group
        model: authentik_core.group
        identifiers:
          name: "app:k8s:cluster:admin"

      - id: app-proxmox-cluster-main-admin-group
        model: authentik_core.group
        identifiers:
          name: "app:proxmox:cluster:main:admin"

      - id: app-argocd-global-admin-group
        model: authentik_core.group
        identifiers:
          name: "app:argocd:global:admin"

      - id: app-argocd-global-sync-group
        model: authentik_core.group
        identifiers:
          name: "app:argocd:global:sync"

      - id: app-argocd-global-readonly-group
        model: authentik_core.group
        identifiers:
          name: "app:argocd:global:readonly"

      - id: app-coder-global-admin-group
        model: authentik_core.group
        identifiers:
          name: "app:coder:global:admin"

      - id: app-coder-global-user-group
        model: authentik_core.group
        identifiers:
          name: "app:coder:global:user"

      - id: app-coder-global-auditor-group
        model: authentik_core.group
        identifiers:
          name: "app:coder:global:auditor"

      - id: app-coder-global-template-admin-group
        model: authentik_core.group
        identifiers:
          name: "app:coder:global:template-admin"

      - id: app-immich-global-admin-group
        model: authentik_core.group
        identifiers:
          name: "app:immich:global:admin"

      - id: app-immich-global-user-group
        model: authentik_core.group
        identifiers:
          name: "app:immich:global:user"

      - id: app-grafana-global-admin-group
        model: authentik_core.group
        identifiers:
          name: "app:grafana:global:admin"

      - id: app-grafana-global-editor-group
        model: authentik_core.group
        identifiers:
          name: "app:grafana:global:editor"

      - id: app-grafana-global-viewer-group
        model: authentik_core.group
        identifiers:
          name: "app:grafana:global:viewer"

      - id: app-nextcloud-global-admin-group
        model: authentik_core.group
        identifiers:
          name: "app:nextcloud:global:admin"

      - id: app-nextcloud-global-user-group
        model: authentik_core.group
        identifiers:
          name: "app:nextcloud:global:user"

      - id: app-nextcloud-global-group-admin-group
        model: authentik_core.group
        identifiers:
          name: "app:nextcloud:global:group-admin"

      - id: app-gitlab-global-admin-group
        model: authentik_core.group
        identifiers:
          name: "app:gitlab:global:admin"

      - id: app-gitlab-global-user-group
        model: authentik_core.group
        identifiers:
          name: "app:gitlab:global:user"

      - id: app-gitlab-global-observer-group
        model: authentik_core.group
        identifiers:
          name: "app:gitlab:global:observer"

      - id: app-gitlab-global-external-user-group
        model: authentik_core.group
        identifiers:
          name: "app:gitlab:global:external-user"

      # ---------------------------------------------------------------------
      # cohort:* groups
      #
      # Cohort groups classify who the user is.
      # They are labels for enrollment, policy decisions, and documentation.
      #
      # Cohort groups MUST NOT grant application permissions directly.
      # Do not set parents here unless there is a clearly documented reason.
      # ---------------------------------------------------------------------

      - id: cohort-nkc-member-group
        model: authentik_core.group
        identifiers:
          name: "cohort:nkc-member"

      - id: cohort-family-group
        model: authentik_core.group
        identifiers:
          name: "cohort:family"

      - id: cohort-friend-group
        model: authentik_core.group
        identifiers:
          name: "cohort:friend"

      # ---------------------------------------------------------------------
      # team:* groups
      #
      # Team groups are the primary assignment targets for users.
      # Assign users to team:* groups, not app:* groups.
      #
      # team:* groups inherit app:* groups through parents.
      # Application OIDC claims should continue exposing only app:* groups.
      # ---------------------------------------------------------------------

      - id: team-owner-group
        model: authentik_core.group
        identifiers:
          name: "team:owner"
        attrs:
          parents:
            - !KeyOf app-authentik-global-admin-group
            - !KeyOf app-k8s-cluster-admin-group
            - !KeyOf app-proxmox-cluster-main-admin-group
            - !KeyOf app-argocd-global-admin-group
            - !KeyOf app-coder-global-admin-group
            - !KeyOf app-coder-global-template-admin-group
            - !KeyOf app-immich-global-admin-group
            - !KeyOf app-grafana-global-admin-group
            - !KeyOf app-nextcloud-global-admin-group
            - !KeyOf app-nextcloud-global-group-admin-group
            - !KeyOf app-gitlab-global-admin-group

      - id: team-dev-user-group
        model: authentik_core.group
        identifiers:
          name: "team:dev-user"
        attrs:
          parents:
            - !KeyOf app-coder-global-user-group
            - !KeyOf app-nextcloud-global-user-group

      - id: team-media-user-group
        model: authentik_core.group
        identifiers:
          name: "team:media-user"
        attrs:
          parents:
            - !KeyOf app-immich-global-user-group

      - id: team-storage-user-group
        model: authentik_core.group
        identifiers:
          name: "team:storage-user"
        attrs:
          parents:
            - !KeyOf app-nextcloud-global-user-group

      # ---------------------------------------------------------------------
      # Deprecated legacy team groups
      #
      # These groups are intentionally not redefined in the new permission model:
      #
      # - team:infra
      # - team:app-dev
      # - team:guest
      #
      # Migration:
      # - team:infra   -> team:owner
      # - team:app-dev -> team:dev-user, with Argo CD sync / Grafana editor removed
      # - team:guest   -> no direct replacement
      #
      # Do not add these groups back unless there is a documented reason.
      # ---------------------------------------------------------------------

      # Legacy direct-access groups such as kubernetes-users and proxmox-users
      # are intentionally not managed in IaC anymore.

  20-oauth-scopes.yaml: |
    version: 1
    metadata:
      name: OIDC scope mappings
    entries:
      - id: kubernetes-profile-scope
        model: authentik_providers_oauth2.scopemapping
        identifiers:
          name: Kubernetes profile claims
        attrs:
          scope_name: profile
          expression: |
            return {
                "name": request.user.name,
                "preferred_username": request.user.username,
                "username": request.user.username,
                "email": request.user.email,
                "groups": [group.name for group in request.user.all_groups() if group.name.startswith("app:k8s:")],
            }

      - id: proxmox-profile-scope
        model: authentik_providers_oauth2.scopemapping
        identifiers:
          name: Proxmox profile claims
        attrs:
          scope_name: profile
          expression: |
            groups = [group.name for group in request.user.all_groups()]

            group_mapping = {
                "app:proxmox:cluster:main:admin": "proxmox-admins",
                # Future examples:
                # "app:proxmox:cluster:main:user": "proxmox-users",
                # "app:proxmox:cluster:main:auditor": "proxmox-auditors",
            }

            proxmox_groups = [
                proxmox_group
                for authentik_group, proxmox_group in group_mapping.items()
                if authentik_group in groups
            ]

            return {
                "name": request.user.name,
                "preferred_username": request.user.username,
                "username": request.user.username,
                "email": request.user.email,
                "groups": proxmox_groups,
            }

      - id: service-email-scope
        model: authentik_providers_oauth2.scopemapping
        identifiers:
          name: Service email claims
        attrs:
          scope_name: email
          expression: |
            return {
                "email": request.user.email,
                "email_verified": True,
            }

      - id: service-profile-scope
        model: authentik_providers_oauth2.scopemapping
        identifiers:
          name: Service profile claims
        attrs:
          scope_name: profile
          expression: |
            return {
                "name": request.user.name,
                "preferred_username": request.user.username,
                "username": request.user.username,
                "email": request.user.email,
            }

      - id: argocd-profile-scope
        model: authentik_providers_oauth2.scopemapping
        identifiers:
          name: Argo CD profile claims
        attrs:
          scope_name: profile
          expression: |
            return {
                "name": request.user.name,
                "preferred_username": request.user.username,
                "username": request.user.username,
                "email": request.user.email,
                "groups": [group.name for group in request.user.all_groups() if group.name.startswith("app:argocd:")],
            }

      - id: coder-profile-scope
        model: authentik_providers_oauth2.scopemapping
        identifiers:
          name: Coder profile claims
        attrs:
          scope_name: profile
          expression: |
            return {
                "name": request.user.name,
                "preferred_username": request.user.username,
                "username": request.user.username,
                "email": request.user.email,
                "groups": [group.name for group in request.user.all_groups() if group.name.startswith("app:coder:")],
            }

      - id: immich-profile-scope
        model: authentik_providers_oauth2.scopemapping
        identifiers:
          name: Immich profile claims
        attrs:
          scope_name: profile
          expression: |
            return {
                "name": request.user.name,
                "preferred_username": request.user.username,
                "username": request.user.username,
                "email": request.user.email,
                "groups": [group.name for group in request.user.all_groups() if group.name.startswith("app:immich:")],
            }

      - id: grafana-profile-scope
        model: authentik_providers_oauth2.scopemapping
        identifiers:
          name: Grafana profile claims
        attrs:
          scope_name: profile
          expression: |
            return {
                "name": request.user.name,
                "preferred_username": request.user.username,
                "username": request.user.username,
                "email": request.user.email,
                "groups": [group.name for group in request.user.all_groups() if group.name.startswith("app:grafana:")],
            }

      - id: nextcloud-profile-scope
        model: authentik_providers_oauth2.scopemapping
        identifiers:
          name: Nextcloud profile claims
        attrs:
          scope_name: profile
          expression: |
            return {
                "name": request.user.name,
                "preferred_username": request.user.username,
                "username": request.user.username,
                "email": request.user.email,
                "groups": [group.name for group in request.user.all_groups() if group.name.startswith("app:nextcloud:")],
            }

      - id: gitlab-profile-scope
        model: authentik_providers_oauth2.scopemapping
        identifiers:
          name: GitLab profile claims
        attrs:
          scope_name: profile
          expression: |
            return {
                "name": request.user.name,
                "preferred_username": request.user.username,
                "username": request.user.username,
                "email": request.user.email,
                "groups": [group.name for group in request.user.all_groups() if group.name.startswith("app:gitlab:")],
            }
  30-oauth-providers.yaml: |
    version: 1
    metadata:
      name: OIDC providers
    entries:
      - id: kubernetes-provider
        model: authentik_providers_oauth2.oauth2provider
        identifiers:
          name: Kubernetes API provider
        attrs:
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          client_type: public
          client_id: kubernetes-cluster
          grant_types:
            - authorization_code
            - refresh_token
            - urn:ietf:params:oauth:grant-type:device_code
          signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
          issuer_mode: per_provider
          include_claims_in_id_token: true
          sub_mode: user_username
          redirect_uris:
            - matching_mode: regex
              url: ^http://localhost(:[0-9]+)?/?$
            - matching_mode: regex
              url: ^http://127\.0\.0\.1(:[0-9]+)?/?$
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [name, "authentik default OAuth Mapping: OpenID 'openid'"]]
            - !Find [authentik_providers_oauth2.scopemapping, [name, "authentik default OAuth Mapping: OpenID 'email'"]]
            - !Find [authentik_providers_oauth2.scopemapping, [name, "Kubernetes profile claims"]]

      - id: proxmox-provider
        model: authentik_providers_oauth2.oauth2provider
        identifiers:
          name: Proxmox VE provider
        attrs:
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          client_type: confidential
          client_id: proxmox-ve
          client_secret: !Env PROXMOX_OIDC_CLIENT_SECRET
          grant_types:
            - authorization_code
            - refresh_token
          signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
          issuer_mode: per_provider
          include_claims_in_id_token: true
          sub_mode: user_email
          redirect_uris:
            - matching_mode: regex
              url: ^https://proxmox\.akatuki-host\.com/?$
            - matching_mode: regex
              url: ^proxman://auth/callback/?$
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [name, "authentik default OAuth Mapping: OpenID 'openid'"]]
            - !Find [authentik_providers_oauth2.scopemapping, [name, "authentik default OAuth Mapping: OpenID 'email'"]]
            - !Find [authentik_providers_oauth2.scopemapping, [name, "Proxmox profile claims"]]

      - id: argocd-provider
        model: authentik_providers_oauth2.oauth2provider
        identifiers:
          name: Argo CD OIDC
        attrs:
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          client_id: argocd
          client_secret: !Env ARGOCD_OIDC_CLIENT_SECRET
          grant_types:
            - authorization_code
            - refresh_token
          signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
          issuer_mode: per_provider
          include_claims_in_id_token: true
          sub_mode: hashed_user_id
          redirect_uris:
            - matching_mode: strict
              url: https://argocd.akatuki-host.com/auth/callback
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [name, "authentik default OAuth Mapping: OpenID 'openid'"]]
            - !Find [authentik_providers_oauth2.scopemapping, [name, "Service email claims"]]
            - !Find [authentik_providers_oauth2.scopemapping, [name, "Argo CD profile claims"]]

      - id: coder-provider
        model: authentik_providers_oauth2.oauth2provider
        identifiers:
          name: Coder OIDC
        attrs:
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          client_id: coder
          client_secret: !Env CODER_OIDC_CLIENT_SECRET
          grant_types:
            - authorization_code
            - refresh_token
          signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
          issuer_mode: per_provider
          include_claims_in_id_token: true
          sub_mode: hashed_user_id
          redirect_uris:
            - matching_mode: strict
              url: https://coder.akatuki-host.com/api/v2/users/oidc/callback
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [name, "authentik default OAuth Mapping: OpenID 'openid'"]]
            - !Find [authentik_providers_oauth2.scopemapping, [name, "authentik default OAuth Mapping: OpenID 'offline_access'"]]
            - !Find [authentik_providers_oauth2.scopemapping, [name, "Service email claims"]]
            - !Find [authentik_providers_oauth2.scopemapping, [name, "Coder profile claims"]]

      - id: immich-provider
        model: authentik_providers_oauth2.oauth2provider
        identifiers:
          name: Immich OIDC
        attrs:
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-explicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          client_id: immich
          client_secret: !Env IMMICH_OIDC_CLIENT_SECRET
          grant_types:
            - authorization_code
            - refresh_token
          signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
          issuer_mode: per_provider
          include_claims_in_id_token: true
          sub_mode: hashed_user_id
          redirect_uris:
            - matching_mode: strict
              url: https://photos.akatuki-host.com/auth/login
            - matching_mode: strict
              url: https://photos.akatuki-host.com/user-settings
            - matching_mode: strict
              url: app.immich:///oauth-callback
            - matching_mode: strict
              url: https://photos.akatuki-host.com/api/oauth/mobile-redirect
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [name, "authentik default OAuth Mapping: OpenID 'openid'"]]
            - !Find [authentik_providers_oauth2.scopemapping, [name, "authentik default OAuth Mapping: OpenID 'offline_access'"]]
            - !Find [authentik_providers_oauth2.scopemapping, [name, "Service email claims"]]
            - !Find [authentik_providers_oauth2.scopemapping, [name, "Immich profile claims"]]

      - id: grafana-provider
        model: authentik_providers_oauth2.oauth2provider
        identifiers:
          name: Grafana OIDC
        attrs:
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          client_id: grafana
          client_secret: !Env GRAFANA_OIDC_CLIENT_SECRET
          grant_types:
            - authorization_code
            - refresh_token
          signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
          issuer_mode: per_provider
          include_claims_in_id_token: true
          sub_mode: hashed_user_id
          redirect_uris:
            - matching_mode: strict
              url: https://grafana.akatuki-host.com/login/generic_oauth
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [name, "authentik default OAuth Mapping: OpenID 'openid'"]]
            - !Find [authentik_providers_oauth2.scopemapping, [name, "authentik default OAuth Mapping: OpenID 'offline_access'"]]
            - !Find [authentik_providers_oauth2.scopemapping, [name, "Service email claims"]]
            - !Find [authentik_providers_oauth2.scopemapping, [name, "Grafana profile claims"]]

      - id: nextcloud-provider
        model: authentik_providers_oauth2.oauth2provider
        identifiers:
          name: Nextcloud OIDC
        attrs:
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          client_id: nextcloud
          client_secret: !Env NEXTCLOUD_OIDC_CLIENT_SECRET
          grant_types:
            - authorization_code
            - refresh_token
          signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
          issuer_mode: per_provider
          include_claims_in_id_token: true
          sub_mode: hashed_user_id
          redirect_uris:
            - matching_mode: strict
              url: https://nextcloud.akatuki-host.com/apps/user_oidc/code
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [name, "authentik default OAuth Mapping: OpenID 'openid'"]]
            - !Find [authentik_providers_oauth2.scopemapping, [name, "authentik default OAuth Mapping: OpenID 'offline_access'"]]
            - !Find [authentik_providers_oauth2.scopemapping, [name, "Service email claims"]]
            - !Find [authentik_providers_oauth2.scopemapping, [name, "Nextcloud profile claims"]]

      - id: gitlab-provider
        model: authentik_providers_oauth2.oauth2provider
        identifiers:
          name: GitLab OIDC
        attrs:
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          client_id: gitlab
          client_secret: !Env GITLAB_OIDC_CLIENT_SECRET
          grant_types:
            - authorization_code
            - refresh_token
          signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
          issuer_mode: per_provider
          include_claims_in_id_token: true
          sub_mode: hashed_user_id
          redirect_uris:
            - matching_mode: strict
              url: https://gitlab.akatuki-host.com/users/auth/openid_connect/callback
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [name, "authentik default OAuth Mapping: OpenID 'openid'"]]
            - !Find [authentik_providers_oauth2.scopemapping, [name, "authentik default OAuth Mapping: OpenID 'offline_access'"]]
            - !Find [authentik_providers_oauth2.scopemapping, [name, "Service email claims"]]
            - !Find [authentik_providers_oauth2.scopemapping, [name, "GitLab profile claims"]]

  10-brand.yaml: |
    version: 1
    metadata:
      name: ソララボ brand
    entries:
      - id: sora-lab-brand
        model: authentik_brands.brand
        state: present
        identifiers:
          domain: authentik-default
          default: true
        attrs:
          branding_title: ソララボ
          branding_logo: https://raw.githubusercontent.com/AkatukiSora/k8s-deploys/master/apps/authentik-blueprints/icons/FullLogo.png
          branding_favicon: https://raw.githubusercontent.com/AkatukiSora/k8s-deploys/master/apps/authentik-blueprints/icons/ShortLogo.png

  40-applications.yaml: |
    version: 1
    metadata:
      name: Authentik applications
    entries:
      - id: kubernetes-application
        model: authentik_core.application
        identifiers:
          slug: kubernetes
        attrs:
          name: Kubernetes API
          provider: !Find [authentik_providers_oauth2.oauth2provider, [name, "Kubernetes API provider"]]
          meta_launch_url: https://kubernetes.default.svc
          icon: https://raw.githubusercontent.com/kubernetes/kubernetes/master/logo/logo.svg
          open_in_new_tab: true

      - id: proxmox-application
        model: authentik_core.application
        identifiers:
          slug: proxmox
        attrs:
          name: Proxmox VE
          provider: !Find [authentik_providers_oauth2.oauth2provider, [name, "Proxmox VE provider"]]
          meta_launch_url: https://proxmox.akatuki-host.com/
          icon: https://cdn.jsdelivr.net/npm/simple-icons@latest/icons/proxmox.svg
          open_in_new_tab: true

      - id: argocd-application
        model: authentik_core.application
        identifiers:
          slug: argocd
        attrs:
