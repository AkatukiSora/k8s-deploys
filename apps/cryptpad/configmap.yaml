apiVersion: v1
kind: ConfigMap
metadata:
  name: cryptpad-config
  namespace: cryptpad
data:
  config.js: |
    module.exports = {
      httpAddress: '0.0.0.0',
      httpPort: 3000,
      httpSafePort: 3001,
      httpUnsafeOrigin: 'https://pad.akatuki-host.com',
      httpSafeOrigin: 'https://pad-sandbox.akatuki-host.com',
    };
  application_config.template.js: |
    AppConfig.registeredOnlyTypes = AppConfig.availablePadTypes;
