apiVersion: v1
kind: ConfigMap
metadata:
  name: cryptpad-config
  namespace: cryptpad
data:
  config.js: |
    module.exports = {
      httpAddress: '0.0.0.0',
      httpPort: 3000,
      httpUnsafeOrigin: 'https://pad.akatuki-host.com',
      httpSafeOrigin: 'https://pad-sandbox.akatuki-host.com',
      websocketPort: 3003,
    };
  application_config.template.js: |
    define(['/common/application_config_internal.js'], function (AppConfig) {
      AppConfig.registeredOnlyTypes = AppConfig.availablePadTypes;
      return AppConfig;
    });
