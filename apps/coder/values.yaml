coder:
  env:
    - name: CODER_ACCESS_URL
      value: "https://coder.akatuki-host.com"
    - name: CODER_PG_CONNECTION_URL
      valueFrom:
        secretKeyRef:
          name: coder-postgres-app
          key: uri
  service:
    type: ClusterIP
  serviceAccount:
    workspaceNamespaces:
      - name: coder-worker
