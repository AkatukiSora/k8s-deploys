apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: coder-postgres-barman-daily
  namespace: coder
spec:
  schedule: "0 30 1 * * *"
  suspend: true
  backupOwnerReference: self
  cluster:
    name: coder-postgres
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
