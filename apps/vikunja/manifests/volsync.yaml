apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: vikunja-data
  namespace: vikunja
spec:
  sourcePVC: vikunja-data
  trigger:
    schedule: "10 */6 * * *"
  restic:
    repository: volsync-restic-vikunja-data
    copyMethod: Snapshot
    storageClassName: ceph-rbd
    volumeSnapshotClassName: csi-rbdplugin-snapclass
    cacheCapacity: 1Gi
    cacheStorageClassName: ceph-rbd
    pruneIntervalDays: 7
    retain:
      daily: 7
      weekly: 5
      monthly: 6
