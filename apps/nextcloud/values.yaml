redis:
  enabled: true
internalDatabase:
  enabled: false
mariadb:
  enabled: true
  primary:
    persistence:
      enabled: true
persistence:
  enabled: true
  accessMode: ReadWriteMany
  size: 100Gi
cronjob:
  enabled: true
hpa:
  enabled: false
ingress:
  enabled: true
  className: cloudflare-tunnel
  annotations:
    kubernetes.io/ingress.class: cloudflare-tunnel
nextcloud:
  host: "nextcloud.akatuki-host.com"
  existingSecret:
    enabled: true
    secretName: nextcloud-admin
    usernameKey: nextcloud-username
    passwordKey: nextcloud-password
  trustedDomains:
    - "nextcloud.akatuki-host.com"
  extraEnv:
    - name: NEXTCLOUD_OIDC_CLIENT_ID
      value: "nextcloud"
    - name: NEXTCLOUD_OIDC_CLIENT_SECRET
      valueFrom:
        secretKeyRef:
          name: nextcloud-oidc-client-secret
          key: client-secret
    - name: NEXTCLOUD_OIDC_DISCOVERY_URL
      value: "https://auth.akatuki-host.com/application/o/nextcloud/.well-known/openid-configuration"
  hooks:
    before-starting: |
      # Bootstrap the user_oidc app and provider idempotently for a fresh install.
      php occ app:install user_oidc || php occ app:enable user_oidc
      php occ user_oidc:provider authentik \
        --clientid="$NEXTCLOUD_OIDC_CLIENT_ID" \
        --clientsecret="$NEXTCLOUD_OIDC_CLIENT_SECRET" \
        --discoveryuri="$NEXTCLOUD_OIDC_DISCOVERY_URL" \
        --group-provisioning=1 \
        --group-whitelist-regex='/^(app:nextcloud:global:admin|app:nextcloud:global:user|app:nextcloud:global:group-admin)$/' \
        --group-restrict-login-to-whitelist=1
      php occ config:app:set --type=string --value=0 user_oidc allow_multiple_user_backends
  configs:
    trusted_proxy: |
      <?php
      $CONFIG = array (
        'trusted_proxies'   => [
          173.245.48.0/20,
          103.21.244.0/22,
          103.22.200.0/22,
          103.31.4.0/22,
          141.101.64.0/18,
          108.162.192.0/18,
          190.93.240.0/20,
          188.114.96.0/20,
          197.234.240.0/22,
          198.41.128.0/17,
          162.158.0.0/15,
          104.16.0.0/13,
          104.24.0.0/14,
          172.64.0.0/13,
          131.0.72.0/22,
          2400:cb00::/32,
          2606:4700::/32,
          2803:f800::/32,
          2405:b500::/32,
          2405:8100::/32,
          2a06:98c0::/29,
          2c0f:f248::/32
        ],
        'overwriteprotocol' => 'https',
        'overwrite.cli.url' => 'https://nextcloud.akatuki-host.com/',
      );
    oidc.config.php: |
      <?php
      $CONFIG = array (
        'user_oidc' => array (
          'login_label' => 'Sign in with Authentik',
          'auto_provision' => true,
          'soft_auto_provision' => true,
          'disable_account_creation' => false,
          'single_logout' => true,
          'send_userinfo_claims' => false,
          'use_pkce' => true,
        ),
      );
