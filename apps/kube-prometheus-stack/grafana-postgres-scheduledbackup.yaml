apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: grafana-postgres-barman-daily
  namespace: monitoring
spec:
  schedule: "0 40 1 * * *"
  suspend: true
  backupOwnerReference: self
  cluster:
    name: grafana-postgres
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
