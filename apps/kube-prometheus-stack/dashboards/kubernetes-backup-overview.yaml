apiVersion: v1
kind: ConfigMap
metadata:
  name: kubernetes-backup-overview-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  kubernetes-backup-overview.json: |
    {
      "id": null,
      "uid": "kubernetes-backup-overview",
      "title": "Kubernetes Backup Overview",
      "tags": ["backup", "volsync", "cnpg", "barman"],
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "time": {"from": "now-7d", "to": "now"},
      "templating": {
        "list": [
          {
            "name": "namespace",
            "type": "query",
            "datasource": null,
            "query": "label_values(up, namespace)",
            "includeAll": true,
            "allValue": ".*",
            "refresh": 1,
            "current": {"selected": true, "text": "All", "value": ".*"}
          },
          {
            "name": "source",
            "type": "query",
            "datasource": null,
            "query": "label_values(volsync_volume_out_of_sync{obj_namespace=~\"$namespace\"}, obj_name)",
            "includeAll": true,
            "allValue": ".*",
            "refresh": 1,
            "current": {"selected": true, "text": "All", "value": ".*"}
          },
          {
            "name": "cluster",
            "type": "query",
            "datasource": null,
            "query": "label_values(cnpg_collector_up{namespace=~\"$namespace\"}, cluster)",
            "includeAll": true,
            "allValue": ".*",
            "refresh": 1,
            "current": {"selected": true, "text": "All", "value": ".*"}
          }
        ]
      },
      "panels": [
        {"type": "stat", "title": "VolSync out-of-sync targets", "gridPos": {"h": 4, "w": 6, "x": 0, "y": 0}, "targets": [{"refId": "A", "expr": "sum(max by (obj_namespace, obj_name, method) (volsync_volume_out_of_sync{role=\"source\", obj_namespace=~\"$namespace\", obj_name=~\"$source\"})) * max(up{namespace=\"volsync-system\"})"}], "fieldConfig": {"defaults": {"unit": "none", "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "red", "value": 1}]}}, "overrides": []}},
        {"type": "stat", "title": "VolSync missed intervals (7d)", "gridPos": {"h": 4, "w": 6, "x": 6, "y": 0}, "targets": [{"refId": "A", "expr": "sum(increase(volsync_missed_intervals_total{role=\"source\", obj_namespace=~\"$namespace\", obj_name=~\"$source\"}[7d])) * max(up{namespace=\"volsync-system\"})"}], "fieldConfig": {"defaults": {"unit": "none", "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 1}, {"color": "red", "value": 5}]}}, "overrides": []}},
        {"type": "stat", "title": "CNPG clusters without successful base backup", "gridPos": {"h": 4, "w": 6, "x": 12, "y": 0}, "targets": [{"refId": "A", "expr": "count(barman_cloud_cloudnative_pg_io_last_available_backup_timestamp{namespace=~\"$namespace\"} == 0) * max(cnpg_collector_up{namespace=~\"$namespace\", cluster=~\"$cluster\"})"}], "fieldConfig": {"defaults": {"unit": "none", "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 1}]}}, "overrides": []}},
        {"type": "stat", "title": "CNPG base backup older than 30h", "gridPos": {"h": 4, "w": 6, "x": 18, "y": 0}, "targets": [{"refId": "A", "expr": "count((time() - label_replace(barman_cloud_cloudnative_pg_io_last_available_backup_timestamp{namespace=~\"$namespace\"}, \"cluster\", \"$1\", \"pod\", \"(.*)-[0-9]+$\")) > 108000) * max(cnpg_collector_up{namespace=~\"$namespace\", cluster=~\"$cluster\"})"}], "fieldConfig": {"defaults": {"unit": "none", "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 1}, {"color": "red", "value": 2}]}}, "overrides": []}},
        {"type": "stat", "title": "CNPG last failure newer than success", "gridPos": {"h": 4, "w": 6, "x": 0, "y": 4}, "targets": [{"refId": "A", "expr": "count((label_replace(barman_cloud_cloudnative_pg_io_last_failed_backup_timestamp{namespace=~\"$namespace\"}, \"cluster\", \"$1\", \"pod\", \"(.*)-[0-9]+$\") > label_replace(barman_cloud_cloudnative_pg_io_last_available_backup_timestamp{namespace=~\"$namespace\"}, \"cluster\", \"$1\", \"pod\", \"(.*)-[0-9]+$\"))) * max(cnpg_collector_up{namespace=~\"$namespace\", cluster=~\"$cluster\"})"}], "fieldConfig": {"defaults": {"unit": "none", "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 1}, {"color": "red", "value": 2}]}}, "overrides": []}},
        {"type": "stat", "title": "WAL ready backlog clusters", "gridPos": {"h": 4, "w": 6, "x": 6, "y": 4}, "targets": [{"refId": "A", "expr": "count(label_replace(cnpg_collector_pg_wal_archive_status{value=\"ready\", namespace=~\"$namespace\"}, \"cluster\", \"$1\", \"pod\", \"(.*)-[0-9]+$\") > 0) * max(cnpg_collector_up{namespace=~\"$namespace\", cluster=~\"$cluster\"})"}], "fieldConfig": {"defaults": {"unit": "none", "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 1}]}}, "overrides": []}},
        {"type": "stat", "title": "VolSync scrape status", "gridPos": {"h": 4, "w": 6, "x": 12, "y": 4}, "targets": [{"refId": "A", "expr": "sum(up{namespace=\"volsync-system\"})"}], "fieldConfig": {"defaults": {"unit": "none", "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "green", "value": 1}]}}, "overrides": []}},
        {"type": "stat", "title": "CNPG scrape status", "gridPos": {"h": 4, "w": 6, "x": 18, "y": 4}, "targets": [{"refId": "A", "expr": "sum(up{pod=~\".*-postgres-[0-9]+$\", namespace=~\"$namespace\"})"}], "fieldConfig": {"defaults": {"unit": "none", "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "green", "value": 1}]}}, "overrides": []}},
        {"type": "table", "title": "VolSync ReplicationSources", "gridPos": {"h": 9, "w": 24, "x": 0, "y": 8}, "targets": [
          {"refId": "A", "expr": "max by (obj_namespace, obj_name, method) (volsync_volume_out_of_sync{role=\"source\", obj_namespace=~\"$namespace\", obj_name=~\"$source\"})", "instant": true, "format": "table"},
          {"refId": "B", "expr": "sum by (obj_namespace, obj_name, method) (increase(volsync_missed_intervals_total{role=\"source\", obj_namespace=~\"$namespace\", obj_name=~\"$source\"}[7d]))", "instant": true, "format": "table"},
          {"refId": "C", "expr": "sum by (obj_namespace, obj_name, method) (increase(volsync_sync_duration_seconds_count{role=\"source\", obj_namespace=~\"$namespace\", obj_name=~\"$source\"}[24h]))", "instant": true, "format": "table"},
          {"refId": "D", "expr": "histogram_quantile(0.5, sum by (le, obj_namespace, obj_name, method) (rate(volsync_sync_duration_seconds_bucket{role=\"source\", obj_namespace=~\"$namespace\", obj_name=~\"$source\"}[24h])))", "instant": true, "format": "table"},
          {"refId": "E", "expr": "histogram_quantile(0.9, sum by (le, obj_namespace, obj_name, method) (rate(volsync_sync_duration_seconds_bucket{role=\"source\", obj_namespace=~\"$namespace\", obj_name=~\"$source\"}[24h])))", "instant": true, "format": "table"},
          {"refId": "F", "expr": "histogram_quantile(0.99, sum by (le, obj_namespace, obj_name, method) (rate(volsync_sync_duration_seconds_bucket{role=\"source\", obj_namespace=~\"$namespace\", obj_name=~\"$source\"}[24h])))", "instant": true, "format": "table"},
          {"refId": "G", "expr": "sum by (obj_namespace, obj_name, method) (increase(volsync_sync_duration_seconds_sum{role=\"source\", obj_namespace=~\"$namespace\", obj_name=~\"$source\"}[24h])) / sum by (obj_namespace, obj_name, method) (increase(volsync_sync_duration_seconds_count{role=\"source\", obj_namespace=~\"$namespace\", obj_name=~\"$source\"}[24h]))", "instant": true, "format": "table"},
          {"refId": "H", "expr": "max(up{namespace=\"volsync-system\"}) * max by (obj_namespace, obj_name, method) (volsync_volume_out_of_sync{role=\"source\", obj_namespace=~\"$namespace\", obj_name=~\"$source\"})", "instant": true, "format": "table"}
        ], "transformations": [{"id": "merge", "options": {}}], "fieldConfig": {"defaults": {}, "overrides": []}},
        {"type": "table", "title": "CloudNativePG / Barman Clusters", "gridPos": {"h": 10, "w": 24, "x": 0, "y": 17}, "targets": [
          {"refId": "A", "expr": "time() - max by (namespace, cluster) (label_replace(barman_cloud_cloudnative_pg_io_last_available_backup_timestamp{namespace=~\"$namespace\"}, \"cluster\", \"$1\", \"pod\", \"(.*)-[0-9]+$\") * on(namespace, cluster) group_left() cnpg_collector_up{namespace=~\"$namespace\", cluster=~\"$cluster\"})", "instant": true, "format": "table"},
          {"refId": "B", "expr": "time() - max by (namespace, cluster) (label_replace(barman_cloud_cloudnative_pg_io_first_recoverability_point{namespace=~\"$namespace\"}, \"cluster\", \"$1\", \"pod\", \"(.*)-[0-9]+$\") * on(namespace, cluster) group_left() cnpg_collector_up{namespace=~\"$namespace\", cluster=~\"$cluster\"})", "instant": true, "format": "table"},
          {"refId": "C", "expr": "max by (namespace, cluster) (label_replace(barman_cloud_cloudnative_pg_io_last_available_backup_timestamp{namespace=~\"$namespace\"}, \"cluster\", \"$1\", \"pod\", \"(.*)-[0-9]+$\") * on(namespace, cluster) group_left() cnpg_collector_up{namespace=~\"$namespace\", cluster=~\"$cluster\"})", "instant": true, "format": "table"},
          {"refId": "D", "expr": "max by (namespace, cluster) (label_replace(barman_cloud_cloudnative_pg_io_last_failed_backup_timestamp{namespace=~\"$namespace\"}, \"cluster\", \"$1\", \"pod\", \"(.*)-[0-9]+$\") * on(namespace, cluster) group_left() cnpg_collector_up{namespace=~\"$namespace\", cluster=~\"$cluster\"})", "instant": true, "format": "table"},
          {"refId": "E", "expr": "max by (namespace, cluster) (label_replace(cnpg_collector_pg_wal_archive_status{value=\"ready\", namespace=~\"$namespace\"}, \"cluster\", \"$1\", \"pod\", \"(.*)-[0-9]+$\") * on(namespace, cluster) group_left() cnpg_collector_up{namespace=~\"$namespace\", cluster=~\"$cluster\"})", "instant": true, "format": "table"},
          {"refId": "F", "expr": "max by (namespace, cluster) (label_replace(cnpg_collector_last_collection_error{namespace=~\"$namespace\"}, \"cluster\", \"$1\", \"pod\", \"(.*)-[0-9]+$\") * on(namespace, cluster) group_left() cnpg_collector_up{namespace=~\"$namespace\", cluster=~\"$cluster\"})", "instant": true, "format": "table"},
          {"refId": "G", "expr": "max by (namespace, cluster) (cnpg_collector_up{namespace=~\"$namespace\", cluster=~\"$cluster\"})", "instant": true, "format": "table"},
          {"refId": "H", "expr": "label_replace(max by (namespace, pod) (up{pod=~\".*-postgres-[0-9]+$\", namespace=~\"$namespace\"}), \"cluster\", \"$1\", \"pod\", \"(.*)-[0-9]+$\")", "instant": true, "format": "table"}
        ], "transformations": [{"id": "merge", "options": {}}], "fieldConfig": {"defaults": {}, "overrides": []}},
        {"type": "timeseries", "title": "VolSync sync duration average (24h)", "gridPos": {"h": 8, "w": 12, "x": 0, "y": 27}, "targets": [{"refId": "A", "expr": "sum by (obj_namespace, obj_name, method) (rate(volsync_sync_duration_seconds_sum{role=\"source\", obj_namespace=~\"$namespace\", obj_name=~\"$source\"}[24h])) / sum by (obj_namespace, obj_name, method) (rate(volsync_sync_duration_seconds_count{role=\"source\", obj_namespace=~\"$namespace\", obj_name=~\"$source\"}[24h]))"}], "fieldConfig": {"defaults": {"unit": "s"}, "overrides": []}},
        {"type": "timeseries", "title": "VolSync missed intervals (7d)", "gridPos": {"h": 8, "w": 12, "x": 12, "y": 27}, "targets": [{"refId": "A", "expr": "increase(volsync_missed_intervals_total{role=\"source\", obj_namespace=~\"$namespace\", obj_name=~\"$source\"}[7d])"}], "fieldConfig": {"defaults": {"unit": "none"}, "overrides": []}},
        {"type": "timeseries", "title": "VolSync out-of-sync", "gridPos": {"h": 8, "w": 12, "x": 0, "y": 35}, "targets": [{"refId": "A", "expr": "max by (obj_namespace, obj_name, method) (volsync_volume_out_of_sync{role=\"source\", obj_namespace=~\"$namespace\", obj_name=~\"$source\"})"}], "fieldConfig": {"defaults": {"unit": "none"}, "overrides": []}},
        {"type": "timeseries", "title": "CNPG base backup age", "gridPos": {"h": 8, "w": 12, "x": 12, "y": 35}, "targets": [{"refId": "A", "expr": "time() - max by (namespace, cluster) (label_replace(barman_cloud_cloudnative_pg_io_last_available_backup_timestamp{namespace=~\"$namespace\", cluster=~\"$cluster\"}, \"cluster\", \"$1\", \"pod\", \"(.*)-[0-9]+$\"))"}], "fieldConfig": {"defaults": {"unit": "s"}, "overrides": []}},
        {"type": "timeseries", "title": "WAL ready backlog", "gridPos": {"h": 8, "w": 12, "x": 0, "y": 43}, "targets": [{"refId": "A", "expr": "max by (namespace, cluster) (label_replace(cnpg_collector_pg_wal_archive_status{value=\"ready\", namespace=~\"$namespace\", cluster=~\"$cluster\"}, \"cluster\", \"$1\", \"pod\", \"(.*)-[0-9]+$\"))"}], "fieldConfig": {"defaults": {"unit": "none"}, "overrides": []}},
        {"type": "timeseries", "title": "CNPG collector errors", "gridPos": {"h": 8, "w": 12, "x": 12, "y": 43}, "targets": [{"refId": "A", "expr": "max by (namespace, cluster) (label_replace(cnpg_collector_last_collection_error{namespace=~\"$namespace\", cluster=~\"$cluster\"}, \"cluster\", \"$1\", \"pod\", \"(.*)-[0-9]+$\"))"}], "fieldConfig": {"defaults": {"unit": "none"}, "overrides": []}},
        {"type": "timeseries", "title": "Scrape status", "gridPos": {"h": 8, "w": 24, "x": 0, "y": 51}, "targets": [{"refId": "A", "expr": "up{namespace=~\"$namespace\", pod=~\".*-postgres-[0-9]+$|.*volsync.*\"}"}], "fieldConfig": {"defaults": {"unit": "none"}, "overrides": []}}
      ]
    }
