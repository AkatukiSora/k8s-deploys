apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: vikunja-postgres
  namespace: vikunja
spec:
  instances: 1
  primaryUpdateStrategy: unsupervised
  enableSuperuserAccess: true
  bootstrap:
    initdb:
      database: vikunja
      owner: vikunja
  storage:
    size: 10Gi
    storageClass: ceph-rbd
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: vikunja-postgres-barman-store
  monitoring:
    enablePodMonitor: true
