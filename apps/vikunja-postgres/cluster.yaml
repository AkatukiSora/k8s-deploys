apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: vikunja-postgres
  namespace: vikunja
spec:
  instances: 1
  primaryUpdateStrategy: unsupervised
  enableSuperuserAccess: true
  bootstrap:
    recovery:
      source: backup
  storage:
    size: 10Gi
    storageClass: ceph-rbd
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: vikunja-postgres-barman-store
  externalClusters:
    - name: backup
      plugin:
        name: barman-cloud.cloudnative-pg.io
        parameters:
          barmanObjectName: vikunja-postgres-barman-store
          serverName: vikunja-postgres
  monitoring:
    enablePodMonitor: true
