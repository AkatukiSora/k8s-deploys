apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: vikunja-postgres-barman-daily
  namespace: vikunja
spec:
  schedule: "0 20 1 * * *"
  suspend: true
  backupOwnerReference: self
  cluster:
    name: vikunja-postgres
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
