apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: vikunja-postgres-allow-vikunja
  namespace: vikunja
spec:
  podSelector:
    matchLabels:
      cnpg.io/cluster: vikunja-postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/instance: vikunja
              app.kubernetes.io/name: vikunja
      ports:
        - protocol: TCP
          port: 5432
