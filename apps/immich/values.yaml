controllers:
  main:
    containers:
      main:
        image:
          tag: v2.7.5
        env:
          DB_HOSTNAME: immich-postgres-rw
          DB_PORT: "5432"
          DB_DATABASE_NAME: immich
          DB_USERNAME: immich
          DB_VECTOR_EXTENSION: vectorchord
          REDIS_HOSTNAME: immich-redis
          IMMICH_MACHINE_LEARNING_URL: http://immich-machine-learning:3003
          DB_PASSWORD:
            valueFrom:
              secretKeyRef:
                name: immich-postgres-app
                key: password
immich:
  persistence:
    library:
      existingClaim: immich-library
valkey:
  enabled: false
server:
  enabled: true
  ingress:
    main:
      enabled: true
      annotations:
        kubernetes.io/ingress.class: cloudflare-tunnel
      hosts:
        - host: photos.example.com
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: main
      tls: []
machine-learning:
  enabled: true
