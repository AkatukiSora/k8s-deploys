controllers:
  main:
    pod:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
    containers:
      main:
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
        image:
          tag: v3.0.3
        env:
          DB_HOSTNAME: immich-postgres-rw.immich-postgres
          DB_PORT: "5432"
          DB_DATABASE_NAME: immich
          DB_USERNAME: immich
          DB_VECTOR_EXTENSION: vectorchord
          REDIS_HOSTNAME: immich-redis
          IMMICH_MACHINE_LEARNING_URL: http://immich-machine-learning:3003
          DB_PASSWORD:
            valueFrom:
              secretKeyRef:
                name: immich-postgres-app
                key: password
immich:
  persistence:
    library:
      existingClaim: immich-library
valkey:
  enabled: false
server:
  enabled: true
  controllers:
    main:
      strategy: Recreate
      pod:
        securityContext:
          seccompProfile:
            type: RuntimeDefault
      containers:
        main:
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
  ingress:
    main:
      enabled: true
      annotations:
        kubernetes.io/ingress.class: cloudflare-tunnel
      hosts:
        - host: photos.akatuki-host.com
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: main
      tls: []
machine-learning:
  enabled: true
  controllers:
    main:
      pod:
        securityContext:
          seccompProfile:
            type: RuntimeDefault
      containers:
        main:
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
