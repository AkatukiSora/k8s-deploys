apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: immich-library
  namespace: immich
spec:
  sourcePVC: immich-library
  trigger:
    schedule: "0 0 */6 * * *"
  restic:
    repository: volsync-restic-immich-library
    copyMethod: Snapshot
    storageClassName: ceph-rbd
    volumeSnapshotClassName: csi-rbdplugin-snapclass
    cacheCapacity: 1Gi
    cacheStorageClassName: ceph-rbd
    pruneIntervalDays: 7
    retain:
      daily: 7
      weekly: 5
      monthly: 6
