[tools]
argocd = "latest"
helm = "latest"
kubectl = "latest"
talosctl = "1.13.6"

[tasks.talos-generate]
description = "Generate Talos MachineConfigs; pass a node name to generate one node"
usage = '''
arg "[node]" {
  help "Inventory node name to generate"
}
'''
run = "bash talos/scripts/generate.sh ${usage_node:-}"

[tasks.talos-validate]
description = "Generate and statically validate Talos MachineConfigs twice"
run = "bash talos/scripts/validate.sh"

[hooks.enter]
shell = "bash"
script = "source <(talosctl completion bash)"
