apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: volsync
  namespace: argocd
spec:
  destination:
    namespace: volsync-system
    server: https://kubernetes.default.svc
  project: platform
  sources:
    - repoURL: https://backube.github.io/helm-charts
      chart: volsync
      targetRevision: 0.16.0
      helm:
        releaseName: volsync
        valueFiles:
          - $values/apps/volsync/values.yaml
    - repoURL: https://github.com/AkatukiSora/k8s-deploys.git
      targetRevision: master
      ref: values
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
