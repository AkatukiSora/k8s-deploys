apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: security-policy-reporter
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: default
  sources:
    - repoURL: https://kyverno.github.io/policy-reporter
      chart: policy-reporter
      targetRevision: 3.7.4
      helm:
        valueFiles:
          - $repo/apps/security/policy-reporter/values.yaml
    - repoURL: https://github.com/AkatukiSora/k8s-deploys.git
      targetRevision: master
      ref: repo
  destination:
    server: https://kubernetes.default.svc
    namespace: policy-reporter
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
