---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: security-kyverno
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: platform
  ignoreDifferences:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jsonPointers:
        - /metadata/annotations
        - /status
      jqPathExpressions:
        - .spec.conversion.webhook.clientConfig.caBundle
    - group: kyverno.io
      kind: ClusterPolicy
      jsonPointers:
        - /status
  sources:
    - repoURL: https://kyverno.github.io/kyverno/
      chart: kyverno
      targetRevision: 3.8.2
      helm:
        valueFiles:
          - $repo/apps/security/kyverno/values.yaml
    - repoURL: https://github.com/AkatukiSora/k8s-deploys.git
      targetRevision: master
      ref: repo
    - repoURL: https://github.com/AkatukiSora/k8s-deploys.git
      targetRevision: master
      path: apps/security/kyverno-policies
  destination:
    server: https://kubernetes.default.svc
    namespace: kyverno
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
