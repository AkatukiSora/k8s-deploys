apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: security-observability
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "15"
spec:
  project: platform
  sources:
    - repoURL: https://github.com/AkatukiSora/k8s-deploys.git
      targetRevision: master
      path: apps/security/prometheus-rules
    - repoURL: https://github.com/AkatukiSora/k8s-deploys.git
      targetRevision: master
      path: apps/security/dashboards
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
