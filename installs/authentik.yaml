apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: authentik
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "6"
spec:
  destination:
    namespace: authentik
    server: https://kubernetes.default.svc
  project: platform
  sources:
    - repoURL: https://charts.goauthentik.io
      chart: authentik
      targetRevision: 2026.5.5
      helm:
        releaseName: authentik
        valueFiles:
          - $values/apps/authentik/values.yaml
    - repoURL: https://github.com/AkatukiSora/k8s-deploys.git
      targetRevision: master
      ref: values
    - repoURL: https://github.com/AkatukiSora/k8s-deploys.git
      path: apps/authentik/manifests
      targetRevision: master
    - repoURL: https://github.com/AkatukiSora/k8s-deploys.git
      path: apps/authentik-postgres
      targetRevision: master
  ignoreDifferences:
    - group: postgresql.cnpg.io
      kind: Cluster
      name: authentik-postgres
      namespace: authentik
      jsonPointers:
        - /metadata/annotations
        - /metadata/labels
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
