apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: security-trivy-operator
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: default
  sources:
    - repoURL: https://aquasecurity.github.io/helm-charts/
      chart: trivy-operator
      targetRevision: 0.32.1
      helm:
        valueFiles:
          - $repo/apps/security/trivy-operator/values.yaml
    - repoURL: https://github.com/AkatukiSora/k8s-deploys.git
      targetRevision: master
      ref: repo
  destination:
    server: https://kubernetes.default.svc
    namespace: trivy-system
  syncPolicy:
    managedNamespaceMetadata:
      annotations:
        argocd.argoproj.io/tracking-id: "security-trivy-operator:/Namespace:trivy-system/trivy-system"
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
